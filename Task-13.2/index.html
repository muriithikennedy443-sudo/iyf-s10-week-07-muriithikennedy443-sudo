<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 13.2 - Persistent To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>✅ My To-Do List</h1>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Add a new task..." />
      <button onclick="addTodo()">+ Add</button>
    </div>

    <div class="filters">
      <button onclick="setFilter('all')" id="filter-all" class="active">All</button>
      <button onclick="setFilter('active')" id="filter-active">Active</button>
      <button onclick="setFilter('completed')" id="filter-completed">Completed</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul id="todoList"></ul>

    <button class="clear-btn" onclick="clearCompleted()">🗑 Clear Completed</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
